trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: 'orbitalert-api'
  containerRegistry: 'acr-orbitalert-conn'
  dockerfilePath: 'dockerfiles/Dockerfile'
  tag: '$(Build.BuildId)'

steps:

  - task: Maven@4
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean package -DskipTests'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '21'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'target'
      ArtifactName: 'orbitalert-api'

  - task: Docker@2
    displayName: Build and Push Image
    inputs:
      command: buildAndPush
      repository: $(imageRepository)
      dockerfile: $(dockerfilePath)
      buildContext: '$(Build.SourcesDirectory)'
      containerRegistry: $(containerRegistry)
      tags: |
        latest
        $(tag)

  - task: AzureCLI@2
    displayName: Restart Container Instance
    inputs:
      azureSubscription: 'azure-orbitalert-conn'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az container restart \
          --resource-group rg-orbitalert-dev \
          --name orbitalert-api-container